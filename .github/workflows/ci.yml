name: Basic CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:


env:
  APP_NAME: github-actions-docker-cicd
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read environment name from GitHub Secret
        run: echo "Deployment environment is configured from GitHub secrets"

      - name: Validate environment secret exists
        env:
          ENVIRONMENT_NAME: ${{ secrets.ENVIRONMENT_NAME }}
        run: |
          if [ -z "$ENVIRONMENT_NAME" ]; then
            echo "ENVIRONMENT_NAME secret is missing"
            exit 1
          fi

          echo "ENVIRONMENT_NAME secret is configured"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Message for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "This workflow is running on main branch"

      - name: Message for pull pull_request
        if: github.event_name == 'pull_request'
        run: echo "This workflow is running for a pull request"

  Docker-build:
    runs-on: ubuntu-latest
    needs: test
    env: 
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-docker-cicd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image.
        run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Run Docker container
        run: docker run --rm $IMAGE_NAME:${{ github.sha }}

      - name: Validate Docker login secrets
        env:
          USER_NAME: ${{ secrets.DOCKERHUB_USERNAME }}
          USER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$USER_NAME" ] || [ -z "$USER_TOKEN" ]; then
            echo "Username or Token secrets are missing"
            exit 1
          fi

          echo "Required secrets are configured"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan DOcker image with trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0' # Change exit-code to '1' to enforce a strict security gate.
          severity: HIGH,CRITICAL
      
      - name: Push to Docker Hub
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
        

  summary:
    runs-on: ubuntu-latest
    needs: Docker-build

    steps:
      - name: Create CI summary repositort
        run: |
          mkdir -p reports
          echo "CI pipeline completed successfully" > reports/ci-summary.txt
          echo "Repository: $GITHUB_REPOSITORY" >> reports/ci-summary.txt
          echo "Commit SHA: $GITHUB_SHA" >> reports/ci-summary.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> reports/ci-summary.txt

      - name: Upload CI summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-report
          path: reports/ci-summary.txt
         