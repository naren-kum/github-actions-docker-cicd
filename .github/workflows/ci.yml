name: Basic CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: show current directory
        uses: pwd

      - name: List repository files
        uses: ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Complete workflow
        run: echo "Basic CI workflow completed successfully"